name: Appium + Maven + Android Emulator

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do projeto
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java (necessário para Maven + Android)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Cache Maven
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # 4. Build Maven (gera APK)
      - name: Build with Maven
        run: mvn clean package

      # 5. Debug APK
      - name: Find APK
        run: find . -name "*.apk" || true

      # 6. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 7. Criar Emulator
      - name: Create AVD
        run: |
          echo "no" | avdmanager create avd -n test -k "system-images;android-29;default;x86_64" --device "pixel"

      # 8. Start Emulator
      - name: Start Emulator
        run: |
          emulator -avd test -no-window -no-audio -gpu swiftshader_indirect &
          adb wait-for-device
          adb shell input keyevent 82

      # 9. Instalar APK automaticamente (SEM erro de path)
      - name: Install APK
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          echo "APK encontrado: $APK_PATH"
          adb install -r "$APK_PATH"

      # 10. Rodar Appium tests (se você tiver)
      - name: Run Appium Tests
        run: mvn test
