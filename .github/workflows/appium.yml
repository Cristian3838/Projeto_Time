name: Appium Android Tests

on:
  push:
    branches:
      - main

jobs:
  android-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run Emulator and Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          arch: x86_64
          profile: pixel
          force-avd-creation: true
          disable-animations: true
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -wipe-data
            -no-snapshot
          script: |
            echo "Dispositivos encontrados:"
            adb devices

            echo "Aguardando Android iniciar..."
            adb wait-for-device

            sleep 120

            echo "Verificando dispositivos..."
            adb devices

            echo "Propriedade de boot:"
            adb shell getprop sys.boot_completed || true

            echo "Iniciando Appium..."
            appium --base-path /wd/hub > appium.log 2>&1 &
            sleep 30

            echo "Executando testes..."
            mvn clean test

      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium.log

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports
            target/site
